<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — DevOrganizado</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

    :root,[data-theme="dark"]{
      --bg:#09090f;
      --bg2:#0f0f18;
      --surface:#161622;
      --surface2:#1c1c2e;
      --border:rgba(255,255,255,.07);
      --border2:rgba(255,255,255,.12);
      --text:#e4e4ec;
      --text2:rgba(228,228,236,.55);
      --text3:rgba(228,228,236,.28);
      --primary:#14b8a6;
      --primary-rgb:20,184,166;
      --primary-dark:#0d9488;
      --accent:#f59e0b;
      --accent-rgb:245,158,11;
      --green:#22c55e;
      --red:#ef4444;
    }

    [data-theme="light"]{
      --bg:#f5f5f0;
      --bg2:#ebebdf;
      --surface:#ffffff;
      --surface2:#f8f8f4;
      --border:rgba(0,0,0,.08);
      --border2:rgba(0,0,0,.13);
      --text:#1a1a2e;
      --text2:rgba(26,26,46,.6);
      --text3:rgba(26,26,46,.3);
    }

    html{scroll-behavior:smooth}
    body{
      font-family:'Inter',system-ui,sans-serif;
      background:var(--bg);color:var(--text);
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      transition:background .4s,color .4s;
      overflow:hidden;
    }
    h1,h2,h3{font-family:'Sora','Inter',sans-serif}
    button{cursor:pointer;font-family:inherit}
    a{text-decoration:none;color:inherit}

    /* AURORA */
    .aurora-bg{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
    [data-theme="light"] .aurora-bg{opacity:.3}
    .aurora{position:absolute;border-radius:50%;filter:blur(150px);opacity:.2;animation:drift 18s ease-in-out infinite alternate}
    .a1{width:450px;height:450px;background:var(--primary);top:-15%;left:-10%}
    .a2{width:400px;height:400px;background:var(--accent);bottom:-15%;right:-10%;animation-delay:5s}
    @keyframes drift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(60px,40px) scale(1.15)}}

    /* THEME TOGGLE */
    .theme-toggle{
      position:fixed;top:20px;right:20px;z-index:10;
      width:40px;height:40px;border-radius:10px;
      border:1px solid var(--border);background:var(--surface);
      color:var(--text2);display:flex;align-items:center;justify-content:center;
      transition:all .3s;
    }
    .theme-toggle:hover{color:var(--primary);border-color:var(--primary)}
    [data-theme="dark"] .icon-sun{display:none}
    [data-theme="light"] .icon-moon{display:none}

    /* CONTAINER */
    .login-container{
      position:relative;z-index:1;
      width:100%;max-width:420px;padding:20px;
    }

    /* CARD */
    .login-card{
      background:var(--surface);border:1px solid var(--border);
      border-radius:20px;padding:40px 32px;
      box-shadow:0 20px 60px rgba(0,0,0,.3);
      transition:background .4s,border-color .4s;
    }
    [data-theme="light"] .login-card{box-shadow:0 20px 60px rgba(0,0,0,.08)}

    /* BRAND */
    .login-brand{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:32px}
    .login-brand-icon{
      width:36px;height:36px;
      background:linear-gradient(135deg,var(--primary),var(--accent));
      border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;
    }
    .login-brand-name{font-family:'Sora',sans-serif;font-weight:700;font-size:1.1rem}

    /* TABS */
    .auth-tabs{
      display:flex;gap:4px;margin-bottom:28px;
      background:var(--bg2);border-radius:10px;padding:4px;
    }
    .auth-tab{
      flex:1;padding:10px;border:none;border-radius:8px;
      background:transparent;color:var(--text2);
      font-size:.82rem;font-weight:600;transition:all .25s;
    }
    .auth-tab.active{background:var(--primary);color:#fff}

    /* FORMS */
    .auth-form{display:none;flex-direction:column;gap:14px}
    .auth-form.active{display:flex}

    .form-title{font-size:1.3rem;font-weight:700;margin-bottom:4px;text-align:center}
    .form-subtitle{font-size:.82rem;color:var(--text2);text-align:center;margin-bottom:8px;line-height:1.5}

    .input-group{position:relative}
    .input-group label{
      display:block;font-size:.75rem;font-weight:600;
      color:var(--text2);margin-bottom:6px;
      text-transform:uppercase;letter-spacing:.5px;
    }
    .input-group input{
      width:100%;padding:12px 16px 12px 44px;
      background:var(--bg2);border:1px solid var(--border);
      border-radius:10px;color:var(--text);
      font-size:.88rem;font-family:'Inter',sans-serif;
      outline:none;transition:all .25s;
    }
    .input-group input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(var(--primary-rgb),.1)}
    .input-group input::placeholder{color:var(--text3)}
    .input-icon{
      position:absolute;bottom:12px;left:14px;
      color:var(--text3);pointer-events:none;
      transition:color .25s;
    }
    .input-group input:focus ~ .input-icon{color:var(--primary)}

    .btn-submit{
      width:100%;padding:14px;border:none;border-radius:10px;
      background:var(--primary);color:#fff;
      font-size:.9rem;font-weight:600;
      transition:all .25s;margin-top:4px;
    }
    .btn-submit:hover{background:var(--primary-dark);box-shadow:0 4px 16px rgba(var(--primary-rgb),.3)}
    .btn-submit:disabled{opacity:.5;cursor:not-allowed}

    .form-link{
      text-align:center;font-size:.8rem;color:var(--text2);
    }
    .form-link a{color:var(--primary);font-weight:600;transition:opacity .2s}
    .form-link a:hover{opacity:.8}

    .divider{
      display:flex;align-items:center;gap:12px;
      color:var(--text3);font-size:.72rem;text-transform:uppercase;letter-spacing:1px;
    }
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

    /* MESSAGES */
    .form-msg{
      padding:10px 14px;border-radius:8px;
      font-size:.8rem;font-weight:500;
      display:none;text-align:center;
      animation:msgIn .3s ease;
    }
    .form-msg.show{display:block}
    .form-msg.error{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.15)}
    .form-msg.success{background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.15)}
    @keyframes msgIn{from{opacity:0;transform:translateY(-6px)}}

    /* PASSWORD STRENGTH */
    .password-strength{display:flex;gap:4px;margin-top:6px}
    .strength-bar{height:3px;flex:1;border-radius:2px;background:var(--border);transition:background .3s}
    .strength-bar.weak{background:var(--red)}
    .strength-bar.medium{background:var(--accent)}
    .strength-bar.strong{background:var(--green)}

    /* LOADING SPINNER */
    .spinner{
      display:inline-block;width:16px;height:16px;
      border:2px solid rgba(255,255,255,.3);
      border-top-color:#fff;border-radius:50%;
      animation:spin .6s linear infinite;
      vertical-align:middle;margin-right:6px;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    /* BACK LINK */
    .back-link{
      display:flex;align-items:center;gap:6px;
      margin-bottom:16px;color:var(--text2);
      font-size:.82rem;font-weight:500;
      cursor:pointer;transition:color .2s;
      background:none;border:none;
    }
    .back-link:hover{color:var(--primary)}

    /* RESPONSIVE */
    @media(max-width:480px){
      .login-card{padding:28px 20px;border-radius:16px}
      .form-title{font-size:1.15rem}
    }
  </style>
</head>
<body>

  <div class="aurora-bg">
    <div class="aurora a1"></div>
    <div class="aurora a2"></div>
  </div>

  <button class="theme-toggle" onclick="toggleTheme()">
    <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  </button>

  <div class="login-container">
    <div class="login-card">

      <!-- BRAND -->
      <div class="login-brand">
        <div class="login-brand-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        </div>
        <span class="login-brand-name">DevOrganizado</span>
      </div>

      <!-- TABS (login/cadastro) -->
      <div class="auth-tabs" id="authTabs">
        <button class="auth-tab active" data-form="loginForm">Entrar</button>
        <button class="auth-tab" data-form="registerForm">Cadastrar</button>
      </div>

      <!-- MESSAGE -->
      <div class="form-msg" id="formMsg"></div>

      <!-- LOGIN FORM -->
      <form class="auth-form active" id="loginForm" onsubmit="handleLogin(event)">
        <div class="input-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="seu@email.com" required>
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        </div>
        <div class="input-group">
          <label for="loginPassword">Senha</label>
          <input type="password" id="loginPassword" placeholder="Sua senha" required>
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </div>
        <button type="submit" class="btn-submit" id="loginBtn">Entrar</button>
        <p class="form-link"><a href="#" onclick="showForgot(event)">Esqueci minha senha</a></p>
      </form>

      <!-- REGISTER FORM -->
      <form class="auth-form" id="registerForm" onsubmit="handleRegister(event)">
        <div class="input-group">
          <label for="regName">Nome</label>
          <input type="text" id="regName" placeholder="Seu nome" required>
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <div class="input-group">
          <label for="regEmail">Email</label>
          <input type="email" id="regEmail" placeholder="seu@email.com" required>
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        </div>
        <div class="input-group">
          <label for="regPassword">Senha</label>
          <input type="password" id="regPassword" placeholder="Mínimo 6 caracteres" required oninput="checkStrength(this.value)">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <div class="password-strength" id="passwordStrength">
            <div class="strength-bar" id="str1"></div>
            <div class="strength-bar" id="str2"></div>
            <div class="strength-bar" id="str3"></div>
          </div>
        </div>
        <button type="submit" class="btn-submit" id="registerBtn">Criar conta</button>
      </form>

      <!-- FORGOT PASSWORD FORM -->
      <form class="auth-form" id="forgotForm" onsubmit="handleForgot(event)">
        <button type="button" class="back-link" onclick="showLogin()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          Voltar ao login
        </button>
        <h3 class="form-title">Recuperar senha</h3>
        <p class="form-subtitle">Digite seu email e enviaremos um link para redefinir sua senha.</p>
        <div class="input-group">
          <label for="forgotEmail">Email</label>
          <input type="email" id="forgotEmail" placeholder="seu@email.com" required>
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        </div>
        <button type="submit" class="btn-submit" id="forgotBtn">Enviar link</button>
      </form>

      <!-- RESET PASSWORD FORM -->
      <form class="auth-form" id="resetForm" onsubmit="handleReset(event)">
        <h3 class="form-title">Nova senha</h3>
        <p class="form-subtitle">Crie sua nova senha abaixo.</p>
        <div class="input-group">
          <label for="resetPassword">Nova senha</label>
          <input type="password" id="resetPassword" placeholder="Mínimo 6 caracteres" required>
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </div>
        <div class="input-group">
          <label for="resetPasswordConfirm">Confirmar senha</label>
          <input type="password" id="resetPasswordConfirm" placeholder="Repita a nova senha" required>
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </div>
        <button type="submit" class="btn-submit" id="resetBtn">Redefinir senha</button>
      </form>

    </div>
  </div>

  <script>
    const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
      ? 'http://localhost:8000'
      : 'https://devorganizado-api.onrender.com';

    // Theme
    const savedTheme = localStorage.getItem('sp_theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('sp_theme', next);
    }

    // Check if already logged in
    if (localStorage.getItem('sp_token')) {
      window.location.href = 'index.html';
    }

    // Check for reset token in URL
    const urlParams = new URLSearchParams(window.location.search);
    const resetToken = urlParams.get('reset');
    if (resetToken) {
      showResetForm();
    }

    // Tabs
    document.querySelectorAll('.auth-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
        document.getElementById(tab.dataset.form).classList.add('active');
        hideMsg();
      });
    });

    // Message
    function showMsg(text, type) {
      const el = document.getElementById('formMsg');
      el.textContent = text;
      el.className = `form-msg show ${type}`;
    }

    function hideMsg() {
      document.getElementById('formMsg').className = 'form-msg';
    }

    // Show forms
    function showForgot(e) {
      e.preventDefault();
      document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
      document.getElementById('forgotForm').classList.add('active');
      document.getElementById('authTabs').style.display = 'none';
      hideMsg();
    }

    function showLogin() {
      document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
      document.getElementById('loginForm').classList.add('active');
      document.getElementById('authTabs').style.display = 'flex';
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      document.querySelector('[data-form="loginForm"]').classList.add('active');
      hideMsg();
    }

    function showResetForm() {
      document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
      document.getElementById('resetForm').classList.add('active');
      document.getElementById('authTabs').style.display = 'none';
      hideMsg();
    }

    // Password strength
    function checkStrength(password) {
      const bars = [document.getElementById('str1'), document.getElementById('str2'), document.getElementById('str3')];
      bars.forEach(b => b.className = 'strength-bar');

      if (password.length === 0) return;

      let score = 0;
      if (password.length >= 6) score++;
      if (password.length >= 8 && /[A-Z]/.test(password) && /[0-9]/.test(password)) score++;
      if (password.length >= 10 && /[^A-Za-z0-9]/.test(password)) score++;

      const levels = ['weak', 'medium', 'strong'];
      for (let i = 0; i < score; i++) {
        bars[i].classList.add(levels[Math.min(i, 2)]);
      }
    }

    // Loading state
    function setLoading(btn, loading) {
      if (loading) {
        btn.disabled = true;
        btn.dataset.originalText = btn.textContent;
        btn.innerHTML = '<span class="spinner"></span>Aguarde...';
      } else {
        btn.disabled = false;
        btn.textContent = btn.dataset.originalText;
      }
    }

    // Login
    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      setLoading(btn, true);
      hideMsg();

      try {
        const res = await fetch(`${API}/api/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('loginEmail').value,
            password: document.getElementById('loginPassword').value,
          }),
        });

        const data = await res.json();

        if (!res.ok) {
          showMsg(data.detail || 'Erro ao fazer login', 'error');
          return;
        }

        localStorage.setItem('sp_token', data.access_token);
        localStorage.setItem('sp_user', JSON.stringify(data.user));
        window.location.href = 'index.html';
      } catch {
        showMsg('Erro de conexão. Verifique se o servidor está rodando.', 'error');
      } finally {
        setLoading(btn, false);
      }
    }

    // Register
    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('registerBtn');
      setLoading(btn, true);
      hideMsg();

      const password = document.getElementById('regPassword').value;
      if (password.length < 6) {
        showMsg('A senha deve ter pelo menos 6 caracteres', 'error');
        setLoading(btn, false);
        return;
      }

      try {
        const res = await fetch(`${API}/api/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: document.getElementById('regName').value,
            email: document.getElementById('regEmail').value,
            password: password,
          }),
        });

        const data = await res.json();

        if (!res.ok) {
          showMsg(data.detail || 'Erro ao cadastrar', 'error');
          return;
        }

        localStorage.setItem('sp_token', data.access_token);
        localStorage.setItem('sp_user', JSON.stringify(data.user));
        window.location.href = 'index.html';
      } catch {
        showMsg('Erro de conexão. Verifique se o servidor está rodando.', 'error');
      } finally {
        setLoading(btn, false);
      }
    }

    // Forgot password
    async function handleForgot(e) {
      e.preventDefault();
      const btn = document.getElementById('forgotBtn');
      setLoading(btn, true);
      hideMsg();

      try {
        const res = await fetch(`${API}/api/forgot-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('forgotEmail').value,
          }),
        });

        showMsg('Se o email estiver cadastrado, enviaremos um link de recuperação. Verifique sua caixa de entrada.', 'success');
      } catch {
        showMsg('Erro de conexão. Verifique se o servidor está rodando.', 'error');
      } finally {
        setLoading(btn, false);
      }
    }

    // Reset password
    async function handleReset(e) {
      e.preventDefault();
      const btn = document.getElementById('resetBtn');
      const password = document.getElementById('resetPassword').value;
      const confirm = document.getElementById('resetPasswordConfirm').value;

      if (password !== confirm) {
        showMsg('As senhas não coincidem', 'error');
        return;
      }

      if (password.length < 6) {
        showMsg('A senha deve ter pelo menos 6 caracteres', 'error');
        return;
      }

      setLoading(btn, true);
      hideMsg();

      try {
        const res = await fetch(`${API}/api/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            token: resetToken,
            new_password: password,
          }),
        });

        const data = await res.json();

        if (!res.ok) {
          showMsg(data.detail || 'Erro ao redefinir senha', 'error');
          return;
        }

        showMsg('Senha redefinida com sucesso! Redirecionando...', 'success');
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 2000);
      } catch {
        showMsg('Erro de conexão. Verifique se o servidor está rodando.', 'error');
      } finally {
        setLoading(btn, false);
      }
    }
  </script>
</body>
</html>
